<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnHub - Online Learning Platform</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        
        /* Header for Homepage */
        header { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 1rem 2rem; color: white; }
        nav { display: flex; justify-content: space-between; align-items: center; }
        nav ul { display: flex; list-style: none; gap: 1rem; }
        nav a { color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 20px; transition: background 0.3s; }
        nav a:hover { background: rgba(255,255,255,0.2); }
        .hero { text-align: center; padding: 4rem 2rem; color: white; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.2rem; margin-bottom: 2rem; }
        .cta { background: #ff6b6b; color: white; padding: 1rem 2rem; border: none; border-radius: 30px; font-size: 1.1rem; cursor: pointer; transition: transform 0.3s; }
        .cta:hover { transform: scale(1.05); }
        
        /* Auth Section */
        .auth-container { max-width: 400px; margin: 2rem auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; }
        .tab-switch { display: flex; }
        .tab { flex: 1; padding: 1rem; background: #f1f1f1; text-align: center; cursor: pointer; transition: background 0.3s; }
        .tab.active { background: #667eea; color: white; }
        .form-panel { padding: 2rem; display: none; }
        .form-panel.active { display: block; }
        h2 { text-align: center; margin-bottom: 1.5rem; color: #333; }
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 1rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
        button { width: 100%; padding: 1rem; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #5a67d8; }
        .links { text-align: center; margin-top: 1rem; }
        .links a { color: #667eea; text-decoration: none; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: #ddd; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        
        /* Responsive */
        @media (max-width: 768px) { .hero h1 { font-size: 2rem; } nav ul { flex-direction: column; gap: 0.5rem; } }
    </style>
</head>
<body>
    <!-- Homepage Section (visible by default) -->
    <header>
        <nav>
            <h3>🏫 LearnHub</h3>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#courses">Courses</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#auth" onclick="showAuth()">Login / Signup</a></li>
            </ul>
        </nav>
    </header>
    <section id="home" class="hero">
        <h1>Welcome to LearnHub</h1>
        <p>Unlock your potential with thousands of online courses in AI, Python, Data Science & more.</p>
        <button class="cta" onclick="showAuth()">Get Started Free</button>
    </section>

    <!-- Auth Container (hidden initially) -->
    <div id="auth" class="auth-container" style="display: none;">
        <div class="tab-switch">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('signup')">Signup</div>
        </div>
        
        <!-- Login Form -->
        <div id="login" class="form-panel active">
            <div class="avatar">👤</div>
            <h2>Login to LearnHub</h2>
            <form>
                <input type="text" placeholder="Username or Email" required>
                <input type="password" placeholder="Password" required>
                <label><input type="checkbox" checked> Remember me</label>
                <button type="submit">Login</button>
            </form>
            <div class="links">
                <a href="#">Forgot Password?</a>
            </div>
        </div>
        
        <!-- Signup Form -->
        <div id="signup" class="form-panel">
            <div class="avatar">✨</div>
            <h2>Create Free Account</h2>
            <form>
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Signup</button>
            </form>
            <div class="links">
                Already have an account? <a href="#" onclick="switchTab('login')">Login</a>
            </div>
        </div>
    </div>

    <script>
        function showAuth() {
            document.getElementById('auth').style.display = 'block';
            document.querySelector('.hero').style.display = 'none';
        }
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(f => f.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }
        // Close auth on outside click
        window.onclick = function(event) {
            const auth = document.getElementById('auth');
            if (event.target == auth) {
                auth.style.display = 'none';
                document.querySelector('.hero').style.display = 'block';
            }
        }
    </script>
</body>
</html>
