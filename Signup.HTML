<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnHub - Online Learning Platform</title>
        
        /* Header for Homepage */
</head>

<body>

        <!-- Signup Form -->
        <div id="signup" class="form-panel">
            <div class="avatar">✨</div>
            <h2>Create Free Account</h2>
            <form>
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Signup</button>
            </form>
            <div class="links">
                Already have an account? <a href="#" onclick="switchTab('login')">Login</a>
            </div>
        </div>
    </div>


    <script>
        function showAuth() {
            document.getElementById('auth').style.display = 'block';
            document.querySelector('.hero').style.display = 'none';
        }
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(f => f.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }
        // Close auth on outside click
        window.onclick = function(event) {
            const auth = document.getElementById('auth');
            if (event.target == auth) {
                auth.style.display = 'none';
                document.querySelector('.hero').style.display = 'block';
            }
        }
    </script>

</body>
</html>
